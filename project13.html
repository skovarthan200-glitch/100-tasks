<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      color: #111827; 
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      height: 32px;
    }

    .login-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }

    .login-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-card p {
      color: #6b7280;
      font-size: 0.9rem;
    }

    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff;
      border: 1px solid #d1d5db;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #374151;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .social-btn:hover {
      background: #f9fafb;
    }
    .social-btn img {
      width: 18px;
      height: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: #9ca3af;
      font-size: 0.875rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgb(79 70 229 / 0.1);
    }
    .form-group.error input {
      border-color: #dc2626;
    }
    .error-msg {
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 6px;
      display: none;
    }
    .form-group.error .error-msg {
      display: block;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input {
      width: auto;
    }
    .checkbox-group label {
      margin: 0;
      font-weight: 400;
      color: #4b5563;
    }
    .forgot-link {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #4338ca;
    }
    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .signup-text {
      text-align: center;
      margin-top: 24px;
      color: #6b7280;
      font-size: 0.9rem;
    }
    .signup-text a {
      color: #4f46e5;
      font-weight: 600;
      text-decoration: none;
    }
    .signup-text a:hover {
      text-decoration: underline;
    }

    @media (min-width: 480px) {
      .login-card {
        padding: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <svg width="120" height="32" viewBox="0 0 120 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#4f46e5"/>
        <text x="44" y="22" font-family="system-ui" font-size="20" font-weight="800" fill="#111827">Nova</text>
      </svg>
    </div>

    <div class="login-card">
      <div class="login-header">
        <h1>Welcome back</h1>
        <p>Sign in to your account</p>
      </div>

      <button class="social-btn">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.4-5.88c0-.6-.05-1.15-.17-1.67z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/>
          <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/>
        </svg>
        Continue with Google
      </button>

      <button class="social-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="#000">
          <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z"/>
        </svg>
        Continue with Apple
      </button>

      <div class="divider">or</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
          <div class="error-msg">Please enter a valid email</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <div class="error-msg">Password is required</div>
        </div>

        <div class="form-options">
          <div class="checkbox-group">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <p class="signup-text">
        Don't have an account? <a href="#">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let isValid = true;

      form.querySelectorAll('.form-group').forEach(group => {
        group.classList.remove('error');
      });

      const email = form.querySelector('#email');
      const password = form.querySelector('#password');

      if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
        email.closest('.form-group').classList.add('error');
        isValid = false;
      }

      if (!password.value.trim()) {
        password.closest('.form-group').classList.add('error');
        isValid = false;
      }

      if (isValid) {
        // Handle login
        alert('Logging in...');
      }
    });
  </script>
</body>
</html>
