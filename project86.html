<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow - Clickable Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --neutral-0: #ffffff;
      --neutral-50: #f8fafc;
      --neutral-100: #f1f5f9;
      --neutral-200: #e2e8f0;
      --neutral-300: #cbd5e1;
      --neutral-600: #475569;
      --neutral-700: #334155;
      --neutral-900: #0f172a;
      --font: 'Inter', system-ui, sans-serif;
      --ease: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    body {
      font-family: var(--font);
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

   .phone {
      width: 393px;
      height: 852px;
      background: #0f172a;
      border-radius: 40px;
      padding: 10px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }

   .screen {
      width: 100%;
      height: 100%;
      background: var(--neutral-0);
      border-radius: 30px;
      overflow: hidden;
      position: relative;
    }

   .status {
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 600;
    }

   .view {
      position: absolute;
      inset: 0;
      background: var(--neutral-0);
      display: none;
      flex-direction: column;
      transform: translateX(100%);
      opacity: 0;
      transition: all var(--ease);
    }

   .view.active {
      display: flex;
      transform: translateX(0);
      opacity: 1;
    }

   .view.slide-out {
      transform: translateX(-100%);
      opacity: 0;
    }

   .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      padding-bottom: 100px;
    }

   .content::-webkit-scrollbar { width: 0; }

   .home-indicator {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

   .home-indicator::after {
      content: '';
      width: 134px;
      height: 5px;
      background: var(--neutral-900);
      border-radius: 100px;
    }

    /* Components */
   .btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 150ms ease;
    }

   .btn:active { transform: scale(0.98); }

   .btn-primary {
      background: var(--primary);
      color: var(--neutral-0);
    }

   .btn-primary:hover { background: var(--primary-dark); }

   .input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-family: var(--font);
      border: 1px solid var(--neutral-300);
      border-radius: 12px;
      margin-bottom: 16px;
      transition: all 150ms ease;
    }

   .input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

   .card {
      background: var(--neutral-0);
      border: 1px solid var(--neutral-200);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 150ms ease;
    }

   .card:active {
      transform: scale(0.98);
      background: var(--neutral-50);
    }

   .badge {
      display: inline-block;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      background: var(--primary);
      color: var(--neutral-0);
    }

    /* Onboarding */
   .hero-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      border-radius: 30px;
      margin: 40px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      animation: popIn 500ms ease-out;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

   .title {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 12px;
      line-height: 1.2;
    }

   .subtitle {
      font-size: 16px;
      color: var(--neutral-600);
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* Header */
   .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

   .header-title {
      font-size: 24px;
      font-weight: 800;
    }

   .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: var(--neutral-0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    /* Task Item */
   .task {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

   .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--neutral-300);
      border-radius: 8px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--neutral-0);
      font-weight: 700;
    }

   .checkbox.checked {
      background: var(--primary);
      border-color: var(--primary);
    }

   .task-content { flex: 1; }

   .task-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      transition: all 150ms ease;
    }

   .task.checked .task-title {
      text-decoration: line-through;
      color: var(--neutral-400);
    }

   .task-meta {
      font-size: 14px;
      color: var(--neutral-600);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* FAB */
   .fab {
      position: absolute;
      bottom: 90px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 50%;
      border: none;
      color: var(--neutral-0);
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgb(99 102 241 / 0.3);
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

   .fab:active { transform: scale(0.9); }

    /* Bottom Nav */
   .nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--neutral-0);
      border-top: 1px solid var(--neutral-200);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: 20px;
    }

   .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--neutral-400);
      font-size: 24px;
      cursor: pointer;
      transition: all 150ms ease;
    }

   .nav-item.active { color: var(--primary); }

   .nav-label {
      font-size: 11px;
      font-weight: 600;
    }

    /* Modal */
   .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      align-items: flex-end;
      z-index: 1000;
    }

   .overlay.active { display: flex; }

   .modal {
      background: var(--neutral-0);
      border-radius: 24px 24px 0 0;
      width: 100%;
      padding: 24px;
      animation: slideUp 300ms ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

   .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--neutral-300);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

   .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Toast */
   .toast {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--neutral-900);
      color: var(--neutral-0);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
      opacity: 0;
      transition: all var(--ease);
      z-index: 2000;
    }

   .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Empty State */
   .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--neutral-600);
    }

   .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

   .empty-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--neutral-900);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="toast" id="toast"></div>

      <!-- View 1: Onboarding -->
      <div class="view active" id="onboarding">
        <div class="status">
          <span>9:41</span>
          <span>●●●</span>
        </div>
        <div class="content">
          <div class="hero-icon">✓</div>
          <div class="title">TaskFlow</div>
          <div class="subtitle">Organize your work and life. Get more done with less stress.</div>
          <button class="btn btn-primary" onclick="goTo('home')">Get Started</button>
        </div>
        <div class="home-indicator"></div>
      </div>

      <!-- View 2: Home -->
      <div class="view" id="home">
        <div class="status">
          <span>9:41</span>
          <span>●●●</span>
        </div>
        <div class="content">
          <div class="header">
            <div>
              <div class="header-title">My Tasks</div>
              <div style="font-size: 14px; color: var(--neutral-600); margin-top: 4px;">Today, Oct 12</div>
            </div>
            <div class="avatar">AK</div>
          </div>

          <div id="task-list">
            <div class="card task" data-id="1">
              <div class="checkbox" onclick="toggleTask(this)">✓</div>
              <div class="task-content">
                <div class="task-title">Design new landing page</div>
                <div class="task-meta">
                  <span class="badge">High</span>
                  <span>Due today</span>
                </div>
              </div>
            </div>

            <div class="card task" data-id="2">
              <div class="checkbox" onclick="toggleTask(this)"></div>
              <div class="task-content">
                <div class="task-title">Review pull requests</div>
                <div class="task-meta">
                  <span>Due tomorrow</span>
                </div>
              </div>
            </div>

            <div class="card task" data-id="3">
              <div class="checkbox" onclick="toggleTask(this)"></div>
              <div class="task-content">
                <div class="task-title">Team standup meeting</div>
                <div class="task-meta">
                  <span>10:00 AM</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button class="fab" onclick="showModal()">+</button>

        <div class="nav">
          <div class="nav-item active" onclick="goTo('home')">
            <div>✓</div>
            <div class="nav-label">Tasks</div>
          </div>
          <div class="nav-item" onclick="showToast('Projects coming soon')">
            <div>📁</div>
            <div class="nav-label">Projects</div>
          </div>
          <div class="nav-item" onclick="showToast('Calendar coming soon')">
            <div>📅</div>
            <div class="nav-label">Calendar</div>
          </div>
          <div class="nav-item" onclick="showToast('Profile coming soon')">
            <div>👤</div>
            <div class="nav-label">Profile</div>
          </div>
        </div>
      </div>

      <!-- Modal: Add Task -->
      <div class="overlay" id="modal" onclick="hideModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-handle"></div>
          <div class="modal-title">New Task</div>
          <input type="text" class="input" id="task-input" placeholder="Task name" autofocus>
          <input type="text" class="input" placeholder="Add description...">
          <div style="display: flex; gap: 12px; margin-top: 8px;">
            <button class="btn" style="flex: 1; background: var(--neutral-100); color: var(--neutral-900);" onclick="hideModal()">Cancel</button>
            <button class="btn btn-primary" style="flex: 1;" onclick="addTask()">Add Task</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentView = 'onboarding';
    let taskIdCounter = 4;

    function goTo(viewId) {
      const current = document.getElementById(currentView);
      const next = document.getElementById(viewId);
      
      if (!next) return;
      
      current.classList.add('slide-out');
      
      setTimeout(() => {
        current.classList.remove('active', 'slide-out');
        next.classList.add('active');
        currentView = viewId;
      }, 300);
    }

    function toggleTask(checkbox) {
      checkbox.classList.toggle('checked');
      checkbox.parentElement.classList.toggle('checked');
      
      if (checkbox.classList.contains('checked')) {
        checkbox.textContent = '✓';
        showToast('Task completed!');
      } else {
        checkbox.textContent = '';
      }
    }

    function showModal() {
      document.getElementById('modal').classList.add('active');
      document.getElementById('task-input').focus();
    }

    function hideModal(event) {
      if (!event || event.target.id === 'modal') {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('task-input').value = '';
      }
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const taskName = input.value.trim();
      
      if (!taskName) {
        showToast('Please enter a task name');
        return;
      }

      const taskList = document.getElementById('task-list');
      const newTask = document.createElement('div');
      newTask.className = 'card task';
      newTask.dataset.id = taskIdCounter++;
      newTask.innerHTML = `
        <div class="checkbox" onclick="toggleTask(this)"></div>
        <div class="task-content">
          <div class="task-title">${taskName}</div>
          <div class="task-meta">
            <span>Just added</span>
          </div>
        </div>
      `;
      
      taskList.appendChild(newTask);
      hideModal();
      showToast('Task added!');
      
      // Scroll to new task
      setTimeout(() => {
        newTask.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideModal();
      }
      if (e.key === 'Enter' && document.getElementById('modal').classList.contains('active')) {
        addTask();
      }
    });
  </script>
</body>
</html>
