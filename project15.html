<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      color: #111827;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

   .auth-container {
      width: 100%;
      max-width: 400px;
    }

   .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

   .auth-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }

   .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }
   .auth-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
   .auth-header p {
      color: #6b7280;
      font-size: 0.9rem;
      line-height: 1.5;
    }

   .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgb(79 70 229 / 0.1);
    }
   .form-group.error input {
      border-color: #dc2626;
    }
   .error-msg {
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 6px;
      display: none;
    }
   .form-group.error.error-msg {
      display: block;
    }

   .btn-primary {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 16px;
    }
   .btn-primary:hover {
      background: #4338ca;
    }
   .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

   .back-link {
      display: block;
      text-align: center;
      color: #4f46e5;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
    }
   .back-link:hover {
      text-decoration: underline;
    }

    /* Success state */
   .success-state {
      text-align: center;
      display: none;
    }
   .success-icon {
      width: 48px;
      height: 48px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
   .success-icon svg {
      width: 24px;
      height: 24px;
      color: #16a34a;
    }
   .success-state h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
   .success-state p {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 24px;
      line-height: 1.5;
    }
   .resend-text {
      color: #6b7280;
      font-size: 0.875rem;
      margin-bottom: 24px;
    }
   .resend-text button {
      background: none;
      border: none;
      color: #4f46e5;
      font-weight: 600;
      cursor: pointer;
    }
   .resend-text button:hover {
      text-decoration: underline;
    }
   .resend-text button:disabled {
      color: #9ca3af;
      cursor: not-allowed;
    }

    @media (min-width: 480px) {
     .auth-card {
        padding: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <svg width="120" height="32" viewBox="0 0 120 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#4f46e5"/>
        <text x="44" y="22" font-family="system-ui" font-size="20" font-weight="800" fill="#111827">Nova</text>
      </svg>
    </div>

    <div class="auth-card">
      <!-- Request state -->
      <div id="requestState">
        <div class="auth-header">
          <h1>Forgot password?</h1>
          <p>No worries. Enter your email and we'll send you reset instructions.</p>
        </div>

        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@company.com">
            <div class="error-msg">Enter a valid email</div>
          </div>

          <button type="submit" class="btn-primary">Send reset link</button>
        </form>

        <a href="#" class="back-link">← Back to sign in</a>
      </div>

      <!-- Success state -->
      <div id="successState" class="success-state">
        <div class="success-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
        </div>
        <h2>Check your email</h2>
        <p>We sent a password reset link to <strong id="userEmail"></strong></p>
        <p class="resend-text">
          Didn't receive it? <button id="resendBtn">Click to resend</button>
        </p>
        <a href="#" class="back-link">← Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const requestState = document.getElementById('requestState');
    const successState = document.getElementById('successState');
    const userEmail = document.getElementById('userEmail');
    const resendBtn = document.getElementById('resendBtn');
    let resendTimer = null;

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const emailInput = form.querySelector('#email');
      const group = emailInput.closest('.form-group');
      
      group.classList.remove('error');
      
      if (!emailInput.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value)) {
        group.classList.add('error');
        return;
      }

      // Show success state
      userEmail.textContent = emailInput.value;
      requestState.style.display = 'none';
      successState.style.display = 'block';
      
      // Start resend countdown
      startResendCountdown();
    });

    function startResendCountdown() {
      let seconds = 60;
      resendBtn.disabled = true;
      resendBtn.textContent = `Resend in ${seconds}s`;
      
      resendTimer = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(resendTimer);
          resendBtn.disabled = false;
          resendBtn.textContent = 'Click to resend';
        } else {
          resendBtn.textContent = `Resend in ${seconds}s`;
        }
      }, 1000);
    }

    resendBtn.addEventListener('click', () => {
      alert('Reset link resent');
      startResendCountdown();
    });
  </script>
</body>
</html>
