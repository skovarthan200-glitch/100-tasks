<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; color: #111827; }
    
    .hero {
      background: linear-gradient(180deg, #eef2ff 0%, #ffffff 100%);
      padding: 64px 0;
      overflow: hidden;
    }
    .hero-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }
    .hero-grid {
      display: grid;
      gap: 40px;
      align-items: center;
    }
    
    .hero-content {
      text-align: center;
    }
    .hero-badge {
      display: inline-block;
      background: #e0e7ff;
      color: #4338ca;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    .hero h1 span {
      color: #4f46e5;
    }
    .hero p {
      font-size: 1.125rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .hero-cta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
    }
    .btn {
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      width: 100%;
      max-width: 280px;
    }
    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }
    .btn-primary:hover {
      background: #4338ca;
    }
    .btn-secondary {
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    .btn-secondary:hover {
      background: #f9fafb;
    }
    
    .hero-trust {
      font-size: 0.875rem;
      color: #6b7280;
    }
    .hero-trust strong {
      color: #111827;
    }
    
    .hero-image {
      position: relative;
    }
    .hero-image img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
    
    /* Desktop: 2 columns */
    @media (min-width: 768px) {
      .hero {
        padding: 96px 0;
      }
      .hero-grid {
        grid-template-columns: 1fr 1fr;
        gap: 64px;
      }
      .hero-content {
        text-align: left;
      }
      .hero h1 {
        font-size: 3.5rem;
      }
      .hero p {
        margin-left: 0;
        margin-right: 0;
      }
      .hero-cta {
        flex-direction: row;
        justify-content: flex-start;
      }
      .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-container">
      <div class="hero-grid">
        <div class="hero-content">
          <div class="hero-badge">New: Analytics 2.0 is here</div>
          <h1>
            Ship products <span>faster</span> with real user feedback
          </h1>
          <p>
            Nova brings feature flags, A/B testing, and zero-config analytics into one platform. 
            Stop guessing what users want.
          </p>
          <div class="hero-cta">
            <a href="#signup" class="btn btn-primary">Start free trial</a>
            <a href="#demo" class="btn btn-secondary">Watch demo</a>
          </div>
          <div class="hero-trust">
            No credit card required • <strong>10,000+</strong> teams trust Nova
          </div>
        </div>
        
        <div class="hero-image">
          <img src="https://placehold.co/600x400/e0e7ff/4f46e5?text=Product+Screenshot" alt="Nova dashboard">
        </div>
      </div>
    </div>
  </section>
</body>
</html>
