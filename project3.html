<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav Bar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; }
    
    .navbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4f46e5;
      text-decoration: none;
    }
    
    .nav-links {
      display: none;
      gap: 32px;
      align-items: center;
    }
    .nav-links a {
      color: #374151;
      text-decoration: none;
      font-weight: 500;
    }
    .nav-links a:hover {
      color: #4f46e5;
    }
    
    .nav-cta {
      display: none;
      gap: 12px;
      align-items: center;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .btn-secondary {
      color: #374151;
    }
    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }
    .btn-primary:hover {
      background: #4338ca;
    }
    
    .menu-toggle {
      display: block;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
    }
    .hamburger {
      width: 24px;
      height: 18px;
      position: relative;
    }
    .hamburger span {
      display: block;
      height: 2px;
      width: 100%;
      background: #374151;
      position: absolute;
      transition: 0.3s;
    }
    .hamburger span:nth-child(1) { top: 0; }
    .hamburger span:nth-child(2) { top: 8px; }
    .hamburger span:nth-child(3) { top: 16px; }
    
    .mobile-menu {
      display: none;
      border-top: 1px solid #e5e7eb;
      padding: 16px;
    }
    .mobile-menu.active {
      display: block;
    }
    .mobile-menu a {
      display: block;
      padding: 12px 0;
      color: #374151;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid #f3f4f6;
    }
    .mobile-cta {
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    /* Desktop */
    @media (min-width: 768px) {
      .nav-links { display: flex; }
      .nav-cta { display: flex; }
      .menu-toggle { display: none; }
      .mobile-menu { display: none !important; }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="#" class="logo">Nova</a>
      
      <nav class="nav-links">
        <a href="#product">Product</a>
        <a href="#pricing">Pricing</a>
        <a href="#docs">Docs</a>
        <a href="#company">Company</a>
      </nav>
      
      <div class="nav-cta">
        <a href="#login" class="btn btn-secondary">Log in</a>
        <a href="#signup" class="btn btn-primary">Sign up free</a>
      </div>
      
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <div class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </button>
    </div>
    
    <div class="mobile-menu" id="mobileMenu">
      <a href="#product">Product</a>
      <a href="#pricing">Pricing</a>
      <a href="#docs">Docs</a>
      <a href="#company">Company</a>
      <div class="mobile-cta">
        <a href="#login" class="btn btn-secondary">Log in</a>
        <a href="#signup" class="btn btn-primary">Sign up free</a>
      </div>
    </div>
  </header>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    
    menuToggle.addEventListener('click', () => {
      mobileMenu.classList.toggle('active');
    });
    
    // Close menu when clicking a link
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('active');
      });
    });
  </script>
</body>
</html>
