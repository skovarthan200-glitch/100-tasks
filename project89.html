<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenFlow - Splash Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      --dark: #0f172a;
      --white: #ffffff;
      --font: 'Inter', system-ui, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    body {
      font-family: var(--font);
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

 .phone {
      width: 393px;
      height: 852px;
      background: #0f172a;
      border-radius: 40px;
      padding: 10px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      overflow: hidden;
    }

 .screen {
      width: 100%;
      height: 100%;
      background: var(--dark);
      border-radius: 30px;
      position: relative;
      overflow: hidden;
    }

    /* Splash Container */
 .splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--gradient);
      animation: fadeOut 400ms ease-out 2.6s forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* Animated Background */
 .splash::before,
 .splash::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 8s ease-in-out infinite;
    }

 .splash::before {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -100px;
      animation-delay: 0s;
    }

 .splash::after {
      width: 200px;
      height: 200px;
      bottom: -50px;
      left: -50px;
      animation-delay: 1s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Logo Container */
 .logo-wrap {
      position: relative;
      margin-bottom: 24px;
      animation: logoEnter 800ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: scale(0.5);
    }

    @keyframes logoEnter {
      to { opacity: 1; transform: scale(1); }
    }

 .logo {
      width: 100px;
      height: 100px;
      background: var(--white);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      position: relative;
      animation: logoPulse 2s ease-in-out 1s infinite;
    }

    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Logo Glow Ring */
 .logo::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
      z-index: -1;
      animation: rotate 3s linear infinite;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    /* App Name */
 .app-name {
      font-size: 36px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(20px);
      animation: textIn 600ms ease-out 400ms forwards;
    }

 .tagline {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      opacity: 0;
      transform: translateY(20px);
      animation: textIn 600ms ease-out 600ms forwards;
    }

    @keyframes textIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading Indicator */
 .loader {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeIn 400ms ease-out 1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

 .loader-dots {
      display: flex;
      gap: 8px;
    }

 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: bounce 1.4s ease-in-out infinite;
    }

 .dot:nth-child(1) { animation-delay: 0s; }
 .dot:nth-child(2) { animation-delay: 0.2s; }
 .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* Version */
 .version {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      opacity: 0;
      animation: fadeIn 400ms ease-out 1.2s forwards;
    }

    /* Main App - Hidden initially */
 .main-app {
      position: absolute;
      inset: 0;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      opacity: 0;
      animation: appIn 400ms ease-out 3s forwards;
    }

    @keyframes appIn {
      to { opacity: 1; }
    }

    /* Status Bar */
 .status {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      z-index: 10;
    }

    /* Home Indicator */
 .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 100px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <span>●●●</span>
      </div>

      <!-- Splash Screen -->
      <div class="splash" id="splash">
        <div class="logo-wrap">
          <div class="logo">⚡</div>
        </div>
        <div class="app-name">ZenFlow</div>
        <div class="tagline">Focus. Flow. Achieve.</div>
        
        <div class="loader">
          <div class="loader-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
        
        <div class="version">Version 1.0.0</div>
      </div>

      <!-- Main App - Shows after splash -->
      <div class="main-app">
        <div>Onboarding Screen 1 →</div>
      </div>

      <div class="home-bar"></div>
    </div>
  </div>

  <script>
    // Auto-transition after 3s
    setTimeout(() => {
      console.log('Splash complete - Navigate to Onboarding');
      // In real app: window.location = '/onboarding' or navigateTo('onboarding')
    }, 3000);

    // Optional: Skip on tap
    document.getElementById('splash').addEventListener('click', () => {
      document.getElementById('splash').style.animation = 'fadeOut 200ms ease-out forwards';
    });
  </script>
</body>
</html>
